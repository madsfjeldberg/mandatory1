services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Frontend (js_fake_info_frontend) expects the backend on :8080
      - "8080:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: addresses
      DB_USER: root
      DB_PASSWORD: ""
      PORT: 3000

  db:
    image: mariadb:11
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
    volumes:
      - db_data:/var/lib/mysql
      - ./db/addresses.sql:/docker-entrypoint-initdb.d/01-addresses.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  db_data:
