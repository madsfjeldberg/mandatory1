name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

    
jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run linting
        run: npx eslint .

  # sonarqube:
  #   runs-on: ubuntu-latest
  #   needs: [linting]
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0
